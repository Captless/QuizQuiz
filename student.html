<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuikQuiz — Student Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { padding: 0; }
  .student-container { max-width: 640px; margin: 0 auto; }
  .student-loading { text-align: center; padding: 60px 0; color: var(--text-secondary); font-size: 16px; }
  .student-error { text-align: center; padding: 60px 0; color: var(--error); }
  .student-error h2 { font-size: 22px; margin-bottom: 8px; }
  .student-submit-wrap { margin-top: 24px; }
  .student-score { text-align: center; padding: 24px; margin-top: 24px; border-top: 1px solid var(--border); }
  .student-score .score-circle { width: 100px; height: 100px; font-size: 28px; }
  #studentQuizContainer.hidden { display: none; }
  #studentSubmitBtn.hidden { display: none; }
  .start-screen { text-align: center; padding: 24px 0; }
  .start-screen h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
  .start-screen p { color: var(--text-secondary); margin-bottom: 6px; font-size: 14px; }
  .start-screen .start-meta { margin: 20px 0 28px; display: flex; justify-content: center; gap: 24px; }
  .start-screen .start-meta span { font-size: 13px; color: var(--text-muted); }
  .start-screen .start-meta strong { color: var(--text-primary); }
  #slideNav.hidden { display: none; }
  #unansweredBox { animation: fadeIn 0.2s ease; }
  .slide-enter { animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  .quiz-subject-badge { display:inline-block; color:var(--text-muted); font-size:13px; font-weight:500; letter-spacing:0.04em; text-transform:capitalize; }
  .quiz-title-static { margin:12px 0 0; font-size:22px; font-weight:700; color:var(--text-primary); }
  .student-header-timer { font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--accent); font-family:var(--font-mono); }
  @media print { .student-submit-wrap { display: none; } }
</style>
</head>
<body>
  <main>
  <header>
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-2xl font-extrabold tracking-tight" style="color:var(--accent);">
        Quik<span style="color:var(--text-primary);">Quiz</span>
      </a>
      <div class="flex items-center gap-3">
        <span id="studentHeaderTimer" class="student-header-timer hidden"></span>
        <button id="studentDarkToggle" class="dark-toggle" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>
  <div class="student-container">

    <div style="max-width:640px;margin:0 auto 24px;text-align:center;">
      <div class="quiz-subject-badge" id="studentSubjectBadge"></div>
      <h1 class="quiz-title-static" id="studentQuizTitle"></h1>
      <p id="studentTopic" class="quiz-subject-badge" style="margin-top:6px;"></p>
    </div>

    <div id="studentLoading" class="student-loading">Loading quiz questions...</div>
    <div id="studentError" class="student-error hidden">
      <h2>Quiz not found</h2>
      <p>This link may have expired or is invalid.</p>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="card hidden">
      <div class="start-screen">
        <div class="start-meta">
          <span>Questions: <strong id="startQCount">0</strong></span>
          <span id="startTimerMeta">Time limit: <strong id="startTimeLimit">—</strong></span>
          <span id="startSubjectMeta" class="hidden">Subject: <strong id="startSubject">—</strong></span>
        </div>
        <button id="startQuizBtn" class="btn btn-primary btn-lg">Start Quiz</button>
      </div>
    </div>

    <!-- Timer Bar -->
    <div class="timer-bar" id="studentTimerBar">
      <span class="timer-display" id="studentTimerDisplay">00:00</span>
      <div class="timer-track"><div class="timer-fill" id="studentTimerFill" style="width:100%"></div></div>
    </div>

    <div id="studentContent" class="hidden">
      <div id="studentQuizContainer"></div>
      <div id="slideNav" class="hidden">
        <div class="slide-dots" id="studentSlideDots"></div>
        <div class="slide-nav">
          <button class="slide-nav-btn" id="slidePrevBtn">◀</button>
          <span class="slide-counter" id="slideCounter"></span>
          <button class="slide-nav-btn" id="slideNextBtn">▶</button>
        </div>
      </div>
      <div class="student-submit-wrap mb-8">
        <button id="studentSubmitBtn" class="btn btn-warning btn-block">Submit Answers</button>
      </div>
      <div id="studentScoreArea" class="student-score hidden"></div>
    </div>
  </div>
  </main>

  <footer class="text-center py-8 text-sm" style="border-top:1px solid var(--border);color:var(--text-muted);">
    <div class="max-w-4xl mx-auto px-4">QuikQuiz &mdash; AI-powered quiz generation for teachers and tutors.</div>
  </footer>

  <script src="/js/student.js"></script>
</body>
</html>
